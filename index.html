<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashikur's Live Work Updates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0D0D0D;
      --s1:    #161616;
      --s2:    #1F1F1F;
      --s3:    #282828;
      --br:    rgba(255,255,255,0.09);
      --brh:   rgba(255,255,255,0.17);
      --tx1:   #EFEFEF;
      --tx2:   #999999;
      --tx3:   #555555;
      --ac-in:  #6366F1;
      --ac-inL: #A5B4FC;
      --ac-tl:  #2DD4BF;
      --ac-vi:  #A78BFA;
      --ac-re:  #F87171;
      --ac-am:  #FB923C;
      --ac-gr:  #34D399;
      --grd: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #2DD4BF 100%);
      --sans: 'Inter', system-ui, sans-serif;
      --disp: 'Space Grotesk', system-ui, sans-serif;
      --r:    16px;
      --ease: 0.22s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg); color: var(--tx1);
      font-family: var(--sans); font-size: 16px; line-height: 1.65;
    }

    .page-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .page-scroll {
      flex: 1;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }

    a { text-decoration: none; color: inherit; }
    ::selection { background: rgba(99,102,241,.28); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      position: relative;
      z-index: 100;
      background: rgba(13,13,13,.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--br);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-logo-link { display: inline-flex; cursor: pointer; line-height: 0; border-radius: 4px; }
    .h-logo-link:hover .h-logo { opacity: 1; }
    .h-logo  { height: 22px; opacity: .88; transition: opacity var(--ease); }
    .h-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: var(--ac-tl); background: rgba(45,212,191,.09); border: 1px solid rgba(45,212,191,.2);
      padding: 4px 12px; border-radius: 100px;
    }
    .h-dot { width: 5px; height: 5px; background: var(--ac-tl); border-radius: 50%; animation: live 2s ease-in-out infinite; }
    @keyframes live { 0%,100%{opacity:1;box-shadow:0 0 4px var(--ac-tl);} 50%{opacity:.3;box-shadow:none;} }
    .h-date { font-size: 12px; color: var(--tx3); white-space: nowrap; }

    /* ── LAYOUT ── */
    .main {
      max-width: 1120px; margin: 0 auto;
      padding: 36px 18px 88px;
      display: flex; flex-direction: column; gap: 48px;
      overflow: visible;
    }

    /* ── HERO ── */
    .hero-wrap {
      padding: 1.5px; border-radius: 24px;
      background: var(--grd);
      box-shadow: 0 0 60px rgba(99,102,241,.12), 0 0 120px rgba(45,212,191,.05);
    }
    .hero {
      background: #111113;
      border-radius: 23px;
      padding: 48px 52px 44px;
      position: relative; overflow: hidden;
    }
    /* subtle noise texture feel via pseudo */
    .hero::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 55% at 100% 0%,   rgba(99,102,241,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 0%   110%,  rgba(45,212,191,.06) 0%, transparent 55%);
    }

    /* top meta row */
    .hero-id {
      display: flex; align-items: center; gap: 24px;
      margin-bottom: 36px; position: relative; z-index: 1;
    }
    /* gradient ring wrapper */
    .hero-avatar-ring {
      width: 84px; height: 84px; border-radius: 50%; flex-shrink: 0;
      background: var(--grd);
      padding: 2px;
      box-shadow: 0 0 0 4px rgba(99,102,241,.10), 0 12px 40px rgba(99,102,241,.30), 0 4px 12px rgba(0,0,0,.6);
      transition: box-shadow .3s ease;
    }
    .hero-avatar-ring:hover {
      box-shadow: 0 0 0 6px rgba(99,102,241,.16), 0 16px 48px rgba(99,102,241,.38), 0 4px 12px rgba(0,0,0,.6);
    }
    .hero-avatar {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; object-position: center top;
      display: block;
      background: var(--s2);
    }
    .hero-name {
      font-family: var(--disp); font-size: 28px; font-weight: 700;
      background: linear-gradient(100deg, #EFEFEF 40%, #A5B4FC 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.045em; line-height: 1.1; margin-bottom: 10px;
    }
    .hero-role-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .hero-role-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--ac-tl);
      background: rgba(45,212,191,.07);
      border: 1px solid rgba(45,212,191,.18);
      padding: 5px 13px; border-radius: 100px;
      box-shadow: 0 0 12px rgba(45,212,191,.08);
    }
    .hero-role-pill::before {
      content: ''; display: block;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--ac-tl);
      box-shadow: 0 0 6px var(--ac-tl);
      animation: live 2s ease-in-out infinite;
    }
    .hero-company-sep { color: var(--tx3); font-size: 12px; opacity: .4; }
    .hero-company { font-size: 12.5px; color: var(--tx3); letter-spacing: .01em; }

    /* content */
    .hero-body { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 20px; }

    .hero-tagline {
      font-family: var(--disp); font-size: 22px; font-weight: 700;
      color: var(--tx1); letter-spacing: -.035em; line-height: 1.35;
    }
    .hero-tagline .em {
      background: linear-gradient(90deg, var(--ac-in), var(--ac-tl));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero-divider-thin { height: 1px; background: var(--br); width: 48px; margin: 2px 0; }

    /* ── NOTICE BANNER ── */
    .notice-banner {
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(90deg, rgba(99,102,241,.12), rgba(45,212,191,.08));
      border: 1px solid rgba(99,102,241,.28);
      border-radius: 14px; padding: 14px 20px;
    }
    .notice-icon {
      font-size: 18px; flex-shrink: 0;
      animation: pulse-icon 2.4s ease-in-out infinite;
    }
    @keyframes pulse-icon { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
    .notice-text {
      font-size: 14px; font-weight: 600; color: var(--tx1); letter-spacing: -.01em;
    }
    .notice-text span { color: var(--ac-inL); }

    .hero-para {
      font-size: 14.5px; color: var(--tx2); line-height: 1.9; max-width: 600px;
    }
    .hero-para .em { color: var(--ac-tl); font-weight: 600; }
    /* ── TABS ── */
    .tabs-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: visible;
    }

    .tabs-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--br);
      border-top: 1px solid var(--br);
      padding-bottom: 0;
      margin-bottom: 28px;
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(13,13,13,.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-left: -18px;
      margin-right: -18px;
      padding-left: 18px;
      padding-right: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    .tab-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--disp); font-size: 14px; font-weight: 600;
      color: var(--tx3); background: none; border: none; cursor: pointer;
      padding: 10px 18px 12px; border-radius: 0;
      transition: color var(--ease);
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--tx2); }
    .tab-btn.active { color: var(--tx1); }

    /* search box in tabs bar */
    .search-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      flex-shrink: 0;
    }
    .search-icon-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      padding: 5px 6px;
      color: var(--tx3);
      transition: color .22s ease;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
    }
    .search-icon-btn:hover { color: var(--tx1); }
    .search-icon-btn svg { display: block; }
    .search-input {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--br);
      border-radius: 8px;
      color: var(--tx1);
      font-family: var(--sans);
      font-size: 12.5px;
      padding: 5px 26px 5px 10px;
      width: 0;
      max-width: 0;
      opacity: 0;
      pointer-events: none;
      transition: max-width .35s cubic-bezier(.16,1,.3,1), opacity .3s ease, border-color .22s ease, background .22s ease;
      outline: none;
      caret-color: var(--ac-tl);
    }
    .search-input::placeholder { color: var(--tx3); }
    .search-input:focus {
      border-color: rgba(99,102,241,.45);
      background: rgba(99,102,241,.06);
    }
    .search-wrap.open .search-input {
      max-width: 180px;
      width: 180px;
      opacity: 1;
      pointer-events: auto;
    }

    /* mobile toggle only shows on small screens; desktop toggle only on large */
    .mobile-search-toggle { display: none; }
    @media (max-width: 600px) {
      .mobile-search-toggle { display: flex; }
      .search-wrap .search-icon-btn:not(.mobile-search-toggle) { display: none; }
    }
    @media (min-width: 601px) {
      .mobile-search-toggle { display: none !important; }
    }

    /* Mobile: search drops to its own full-width row */
    @media (max-width: 600px) {
      .tabs-bar {
        flex-wrap: wrap;
        padding-bottom: 0;
      }
      .search-wrap {
        order: 3;
        margin-left: 0;
        position: relative;
        width: 100%;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        visibility: hidden;
        padding: 0;
        transition: max-height .32s cubic-bezier(.16,1,.3,1),
                    opacity .25s ease,
                    visibility .25s ease,
                    padding .32s ease;
      }
      .search-wrap.open {
        max-height: 50px;
        opacity: 1;
        visibility: visible;
        padding: 6px 0 8px;
      }
      .search-wrap .search-icon-btn { display: none; }
      .search-input {
        width: 100% !important;
        max-width: 100% !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        font-size: 14px;
        padding: 7px 32px 7px 12px;
      }
      .search-clear {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
      }
    }
    .search-clear {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--tx3); font-size: 12px; line-height: 1;
      padding: 3px 4px;
      display: none;
      transition: color .22s ease;
      border-radius: 4px;
    }
    .search-wrap.has-value .search-clear { display: flex; align-items: center; }
    .search-clear:hover { color: var(--tx1); }
    .search-no-results {
      padding: 48px 24px; text-align: center;
      color: var(--tx3); font-size: 14px;
      border: 1px dashed var(--br); border-radius: var(--r);
      display: none;
    }
    /* active underline */
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
      background: var(--tx1); border-radius: 2px 2px 0 0;
    }
    .tab-count {
      font-size: 11px; font-weight: 700; color: var(--tx3);
      background: var(--s2); border: 1px solid var(--br);
      padding: 1px 8px; border-radius: 20px;
      transition: color var(--ease), background var(--ease);
    }
    .tab-btn.active .tab-count { color: var(--tx2); background: var(--s3); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── PROJECT CARDS ── */
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }

    .proj-card {
      border-radius: var(--r);
      padding: 22px 22px 20px; display: flex; flex-direction: column; gap: 12px;
      position: relative; overflow: hidden;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
      cursor: default; border: 1px solid transparent;
    }
    .proj-card:hover { transform: translateY(-2px); box-shadow: 0 18px 48px rgba(0,0,0,.55); }

    /* per-status tinted wash + border */
    .proj-card.st-active   { background: rgba(52,211,153,.05);  border-color: rgba(52,211,153,.18); }
    .proj-card.st-live     { background: rgba(99,102,241,.05);  border-color: rgba(99,102,241,.18); }
    .proj-card.st-upcoming { background: rgba(251,146,60,.04);  border-color: rgba(251,146,60,.16); }
    .proj-card.st-security { background: rgba(248,113,113,.05); border-color: rgba(248,113,113,.17); }
    .proj-card.st-research { background: rgba(167,139,250,.05); border-color: rgba(167,139,250,.18); }

    /* hover brightens border */
    .proj-card.st-active:hover   { border-color: rgba(52,211,153,.35); }
    .proj-card.st-live:hover     { border-color: rgba(99,102,241,.35); }
    .proj-card.st-upcoming:hover { border-color: rgba(251,146,60,.32); }
    .proj-card.st-security:hover { border-color: rgba(248,113,113,.34); }
    .proj-card.st-research:hover { border-color: rgba(167,139,250,.35); }


    .pc-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    .pc-name { font-family: var(--disp); font-size: 15px; font-weight: 600; color: var(--tx1); letter-spacing: -.02em; line-height: 1.3; flex: 1; min-width: 0; }

    .pc-num {
      font-family: var(--disp); font-size: 13px; font-weight: 700; letter-spacing: -.02em;
      padding: 4px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
      background: rgba(255,255,255,.06); border: 1px solid var(--br);
      color: var(--tx2);
    }
    .proj-card.st-active   .pc-num { color: var(--ac-gr);  border-color: rgba(52,211,153,.25);  background: rgba(52,211,153,.08); }
    .proj-card.st-live     .pc-num { color: var(--ac-inL); border-color: rgba(99,102,241,.25);  background: rgba(99,102,241,.08); }
    .proj-card.st-upcoming .pc-num { color: var(--ac-am);  border-color: rgba(251,146,60,.22);  background: rgba(251,146,60,.07); }
    .proj-card.st-security .pc-num { color: var(--ac-re);  border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.08); }
    .proj-card.st-research .pc-num { color: var(--ac-vi);  border-color: rgba(167,139,250,.25); background: rgba(167,139,250,.08); }

    .b-upcoming { background: rgba(251,146,60,.13);  color: #FDBA74; }

    .pc-deadline {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--ac-am); font-weight: 500;
    }
    .pc-client {
      font-size: 11.5px; color: var(--tx3); font-weight: 500;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .pc-client::before { content: '◈'; font-size: 9px; opacity: .6; }
    .pc-deadline::before { content: '⏱'; font-size: 10px; }
    .pc-url {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--ac-inL); font-weight: 500;
      text-decoration: none; width: fit-content;
    }
    .pc-url::before { content: '↗'; font-size: 11px; opacity: .7; }
    .pc-url:hover { text-decoration: underline; }
    .pc-update-box {
      padding: 11px 13px; background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; font-size: 12.5px; color: var(--tx2); line-height: 1.65;
    }
    .pc-update-label {
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--tx3);
    }
    .pc-update-label::before { content: ''; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--tx3); flex-shrink: 0; }
    .pc-update-posted { color: var(--tx3); }
    .pc-update-when { color: var(--tx2); text-transform: none; letter-spacing: .02em; font-weight: 600; }

    /* ── UPDATES FEED ── */
    .updates-feed { display: flex; flex-direction: column; gap: 28px; }

    .date-group { display: flex; flex-direction: column; gap: 10px; }

    .date-heading {
      display: flex; align-items: center; gap: 12px;
    }
    .date-label {
      font-family: var(--disp); font-size: 12px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; color: var(--tx3);
      white-space: nowrap;
    }
    .date-label-posted { color: var(--tx3); margin-right: 2px; }
    .date-label-when { color: var(--tx2); }
    .date-line { flex: 1; height: 1px; background: var(--br); }

    .date-entries { display: flex; flex-direction: column; gap: 8px; padding-left: 0; }

    .upd-card {
      background: var(--s1); border: 1px solid var(--br);
      border-radius: var(--r); padding: 15px 18px;
      transition: border-color var(--ease);
    }
    .upd-card.is-latest { border-color: rgba(99,102,241,.26); }
    .upd-card:hover { border-color: var(--brh); }

    .upd-head { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
    .upd-chip-new {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
      color: var(--ac-in); background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2);
      padding: 2px 8px; border-radius: 5px;
    }
    .upd-chip-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ac-in); animation: live 1.5s ease-in-out infinite; }
    .upd-proj-chip {
      font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      padding: 2px 9px; border-radius: 5px;
    }
    .upd-text { font-size: 13.5px; color: var(--tx2); line-height: 1.75; }

    /* ── EMPTY ── */
    .empty { padding: 48px 24px; text-align: center; color: var(--tx3); font-size: 14px; border: 1px dashed var(--br); border-radius: var(--r); }

    /* ── FOOTER ── */
    .site-footer {
      position: relative;
      margin-top: 72px;
      padding: 48px 18px 52px;
      text-align: center;
      overflow: hidden;
    }
    .site-footer::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: min(480px, 90%); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.45), rgba(45,212,191,.35), transparent);
    }
    .site-footer::after {
      content: '';
      position: absolute;
      inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 70% at 50% 100%, rgba(99,102,241,.06) 0%, transparent 70%);
    }
    .footer-quote {
      position: relative; z-index: 1;
      font-family: var(--disp);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.015em;
      line-height: 1.7;
      color: var(--tx2);
      max-width: 480px;
      margin: 0 auto 20px;
    }
    .footer-quote .foot-em {
      background: linear-gradient(90deg, var(--ac-in), var(--ac-tl));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      font-weight: 700;
    }
    .footer-meta {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 11.5px; color: var(--tx3); letter-spacing: .04em;
    }
    .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--tx3); opacity: .4; }
    .footer-year { font-variant-numeric: tabular-nums; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .main { padding: 24px 14px 72px; gap: 40px; }
      .hero { padding: 32px 24px 28px; }
      .hero-name { font-size: 22px; }
      .hero-tagline { font-size: 17px; }
      .hero-para { font-size: 14.5px; }
      .hero-avatar-ring { width: 62px; height: 62px; }
      .proj-grid { grid-template-columns: 1fr; gap: 9px; }
      .h-date { display: none; }
      .tab-btn { font-size: 13px; padding: 9px 14px 11px; }
    }

    @media (max-width: 480px) {
      header { padding: 0 14px; height: 52px; }
      .h-logo { height: 20px; }
      .main { padding: 18px 12px 60px; gap: 32px; }

      .hero { border-radius: 18px; padding: 24px 16px 22px; }
      .hero-id { gap: 14px; margin-bottom: 24px; }
      .hero-avatar-ring { width: 54px; height: 54px; padding: 2px; }
      .hero-name { font-size: 19px; }
      .hero-tagline { font-size: 18px; }
      .hero-para { font-size: 14px; }
      .proj-card { padding: 17px 15px 15px; }
      .pc-name { font-size: 14.5px; }
      .upd-text { font-size: 13px; }
      .tab-btn { padding: 8px 12px 10px; font-size: 12.5px; }
      .tabs-bar { margin-bottom: 22px; }
    }

    /* ═══════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════ */

    /* Keyframes */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* Header entrance */
    header {
      animation: fadeIn .5s ease both;
    }

    /* Hero entrance — staggered children */
    .hero-wrap {
      animation: scaleIn .6s cubic-bezier(.16,1,.3,1) .1s both;
    }
    .hero-id {
      animation: fadeUp .55s cubic-bezier(.16,1,.3,1) .25s both;
    }
    .hero-tagline {
      animation: fadeUp .5s cubic-bezier(.16,1,.3,1) .38s both;
    }
    .hero-divider-thin {
      animation: fadeIn .4s ease .5s both;
    }
    .hero-para {
      animation: fadeUp .5s cubic-bezier(.16,1,.3,1) .52s both;
    }

    /* Gradient name shimmer */
    .hero-name {
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
    }

    /* Notice banner */
    .notice-banner {
      animation: fadeUp .5s cubic-bezier(.16,1,.3,1) .62s both;
    }

    /* Footer */
    .site-footer {
      animation: fadeUp .6s cubic-bezier(.16,1,.3,1) .8s both;
    }

    /* Tab bar */
    .tabs-bar {
      animation: fadeIn .4s ease .7s both;
    }

    /* Scroll-driven card reveal */
    .proj-card,
    .upd-card,
    .date-group {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .45s cubic-bezier(.16,1,.3,1), transform .45s cubic-bezier(.16,1,.3,1);
    }
    .proj-card.visible,
    .upd-card.visible,
    .date-group.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Card hover — lift + border glow */
    .proj-card {
      transition:
        opacity .45s cubic-bezier(.16,1,.3,1),
        transform .45s cubic-bezier(.16,1,.3,1),
        box-shadow .28s ease,
        border-color .28s ease,
        translate .28s ease;
    }
    .proj-card.visible:hover {
      translate: 0 -3px;
    }

    /* Update card hover */
    .upd-card {
      transition:
        opacity .45s cubic-bezier(.16,1,.3,1),
        transform .45s cubic-bezier(.16,1,.3,1),
        border-color .28s ease,
        translate .28s ease;
    }
    .upd-card.visible:hover {
      translate: 0 -2px;
    }

    /* Tab switch — content fade */
    .tab-panel.active {
      animation: fadeUp .35s cubic-bezier(.16,1,.3,1) both;
    }

    /* Avatar ring subtle rotate on hover */
    .hero-avatar-ring {
      transition: box-shadow .35s ease, transform .35s ease;
    }
    .hero-avatar-ring:hover {
      transform: scale(1.04) rotate(2deg);
    }

    /* Tab button hover underline slide */
    .tab-btn::before {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%; right: 50%;
      height: 2px;
      background: var(--tx3);
      border-radius: 2px 2px 0 0;
      transition: left .22s ease, right .22s ease;
    }
    .tab-btn:not(.active):hover::before {
      left: 0; right: 0;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
      .proj-card, .upd-card, .date-group {
        opacity: 1; transform: none;
      }
    }
  </style>

/* project card — uses p.note for snippet */
function card(p, idx) {
  const num = String(idx + 1).padStart(2, '0');
  return `
    <div class="proj-card st-${p.status}" data-num="${num}">
      <div class="pc-top">
        <div class="pc-name">${p.name}</div>
        <span class="pc-num">#${num}</span>
      </div>
      ${p.client ? `<div class="pc-client">${p.client}</div>` : ''}
      ${p.deadline ? `<div class="pc-deadline">${p.deadline}</div>` : ''}
      ${p.url ? `<a href="${p.url}" target="_blank" class="pc-url">${p.url.replace(/https?:\/\//,'')}</a>` : ''}
      ${p.note ? `
        <div class="pc-update-box">
          <div class="pc-update-label"><span class="pc-update-posted">Posted</span><span class="pc-update-when">${p.note.date}</span></div>
          ${p.note.text}
        </div>` : ''}
    </div>`;
}

/* quick updates feed — purely independent, uses `tag` as label */
function buildUpdateFeed() {
  const order = {};
  UPDATES.forEach((u, i) => { if (!(u.date in order)) order[u.date] = i; });
  const dates = Object.keys(order).sort((a, b) => order[a] - order[b]);

  const grouped = {};
  UPDATES.forEach(u => {
    if (!grouped[u.date]) grouped[u.date] = [];
    grouped[u.date].push(u);
  });

  let isFirst = true;
  return dates.map(date => {
    const cards = grouped[date].map(u => {
      const first = isFirst;
      isFirst = false;
      return `
        <div class="upd-card${first ? ' is-latest' : ''}">
          <div class="upd-head">
            ${first ? `<span class="upd-chip-new"><span class="upd-chip-dot"></span>Latest</span>` : ''}
            ${u.tag ? `<span class="upd-proj-chip b-upcoming">${u.tag}</span>` : ''}
          </div>
          <div class="upd-text">${u.text}</div>
        </div>`;
    }).join('');

    return `
      <div class="date-group">
        <div class="date-heading">
          <div class="date-label"><span class="date-label-posted">Posted</span><span class="date-label-when">${date}</span></div>
          <div class="date-line"></div>
        </div>
        <div class="date-entries">${cards}</div>
      </div>`;
  }).join('');
}

/* tab switching */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const panel = document.getElementById('tab-' + btn.dataset.tab);
    panel.classList.add('active');
    /* re-trigger scroll observer for newly visible panel */
    panel.querySelectorAll('.proj-card,.upd-card,.date-group').forEach(el => {
      el.classList.remove('visible');
      observer.observe(el);
    });
  });
});

/* scroll-reveal observer */
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      /* stagger siblings in the same grid row */
      const siblings = [...(entry.target.parentElement?.children || [])];
      const idx = siblings.indexOf(entry.target);
      entry.target.style.transitionDelay = (idx % 3) * 60 + 'ms';
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

document.querySelectorAll('.proj-card, .upd-card, .date-group').forEach(el => observer.observe(el));

/* ── SEARCH ── */
const searchWrap  = document.getElementById('searchWrap');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchToggle= document.getElementById('searchToggle');
const noResults   = document.getElementById('searchNoResults');

/* on mobile the icon lives outside the wrap in the tabs bar */
document.getElementById('mobileSearchToggle')?.addEventListener('click', toggleSearch);
searchToggle.addEventListener('click', toggleSearch);

function toggleSearch() {
  const isOpen = searchWrap.classList.toggle('open');
  if (isOpen) {
    setTimeout(() => searchInput.focus(), 50);
  } else {
    clearSearch();
  }
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchWrap.classList.toggle('has-value', q.length > 0);
  filterProjects(q);
  if (!q) collapseSearch();
});

searchClear.addEventListener('click', () => {
  collapseSearch();
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') collapseSearch();
});

function collapseSearch() {
  searchInput.value = '';
  searchWrap.classList.remove('has-value', 'open');
  searchInput.blur();
  filterProjects('');
}

function filterProjects(q) {
  const cards = document.querySelectorAll('#tab-projects .proj-card');
  let visible = 0;
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    const match = !q || text.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  noResults.style.display = (q && visible === 0) ? 'block' : 'none';
}

function clearSearch() {
  searchInput.value = '';
  searchWrap.classList.remove('has-value');
  filterProjects('');
}
</script>
